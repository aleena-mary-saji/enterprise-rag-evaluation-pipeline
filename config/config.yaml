# System Configuration for Enterprise RAG & Evaluation Pipeline

data:
  docs_dir: "data/sample_docs"
  db_dir: "data/vectordb"
  collection_name: "rag_knowledge_base"

chunking:
  method: "semantic" # Options: "semantic", "recursive"
  min_chunk_size: 100 # minimum character length for a sentence chunk
  max_chunk_size: 800 # target maximum characters for a chunk
  similarity_threshold: 0.65 # threshold distance (cosine similarity) to trigger a new semantic chunk

embedding:
  model_name: "sentence-transformers/all-MiniLM-L6-v2"
  device: "cpu" # Options: "cpu", "cuda"

retrieval:
  dense_weight: 0.7 # Weight for Vector Search scores in hybrid fusion
  sparse_weight: 0.3 # Weight for BM25 scores in hybrid fusion
  top_k_retrieved: 15 # Number of initial candidates to pull from vector + BM25 search
  top_k_reranked: 4 # Number of final context chunks to send to the LLM after re-ranking
  reranker_model_name: "cross-encoder/ms-marco-MiniLM-L-6-v2"

llm:
  provider: "mock" # Reverted to "mock" for lightweight zero-dependency execution. Switch to "ollama" for local LLMs.
  model_name: "llama3" # Primary generation model (if using ollama)
  eval_model_name: "llama3" # Primary evaluation judge model (if using ollama)
  api_base: "http://localhost:11434" # Default Ollama base URL
  temperature: 0.0 # Standard temperature for deterministic facts and evaluations
  max_tokens: 800
